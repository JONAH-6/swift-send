openapi: 3.0.3
info:
  title: SwiftSend Remittance API (Prototype)
  version: '0.1.0'
  description: Core endpoints for transfers, wallets, and escrow (prototype-level).
servers:
  - url: http://localhost:4000

paths:
  /health:
    get:
      summary: System health check
      description: Checks overall system health including database and blockchain connectivity
      operationId: healthCheck
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ready, degraded]
                  timestamp:
                    type: string
                    format: date-time
                  environment:
                    type: string
                  stellar:
                    type: object
                    properties:
                      network:
                        type: string
                      horizonUrl:
                        type: string
                      status:
                        type: string
                        enum: [online, offline]
                      latencyMs:
                        type: number
                      checkedAt:
                        type: string
                        format: date-time
                  database:
                    type: object
                    properties:
                      url:
                        type: string
                      status:
                        type: string
                        enum: [online, offline]
                      latencyMs:
                        type: number
                      checkedAt:
                        type: string
                        format: date-time
                      details:
                        type: string
                  queues:
                    type: object
                    properties:
                      settlementDelayMs:
                        type: number
                      maxAttempts:
                        type: number
        '503':
          description: Service unavailable

  /health/live:
    get:
      summary: Liveness probe
      description: Simple liveness check that only verifies the service is running
      operationId: livenessCheck
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [alive]
                  timestamp:
                    type: string
                    format: date-time

  /health/ready:
    get:
      summary: Readiness probe
      description: Readiness check that verifies all dependencies are ready
      operationId: readinessCheck
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ready, degraded]
                  timestamp:
                    type: string
                    format: date-time
                  environment:
                    type: string
                  stellar:
                    type: object
                    properties:
                      network:
                        type: string
                      horizonUrl:
                        type: string
                      status:
                        type: string
                        enum: [online, offline]
                      latencyMs:
                        type: number
                      checkedAt:
                        type: string
                        format: date-time
                  database:
                    type: object
                    properties:
                      url:
                        type: string
                      status:
                        type: string
                        enum: [online, offline]
                      latencyMs:
                        type: number
                      checkedAt:
                        type: string
                        format: date-time
                      details:
                        type: string
                  queues:
                    type: object
                    properties:
                      settlementDelayMs:
                        type: number
                      maxAttempts:
                        type: number
        '503':
          description: Service not ready

  /transfers:
    post:
      summary: Create a transfer (idempotent)
      operationId: createTransfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransfer'
      responses:
        '201':
          description: Transfer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '400':
          description: Validation error

  /transfers/{id}:
    get:
      summary: Get transfer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transfer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '404':
          description: Not found

  /escrow/{transferId}/release:
    post:
      summary: Release escrow for a transfer
      parameters:
        - name: transferId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Escrow released
        '404':
          description: Not found

  /escrow/{transferId}/refund:
    post:
      summary: Refund escrow for a transfer
      parameters:
        - name: transferId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Escrow refunded
        '404':
          description: Not found

components:
  schemas:
    CreateTransfer:
      type: object
      required: [idempotency_key, from_wallet_id, amount, currency, to]
      properties:
        idempotency_key:
          type: string
        from_wallet_id:
          type: string
        to:
          type: object
          properties:
            contact_id:
              type: string
            wallet_public_key:
              type: string
        amount:
          type: number
        currency:
          type: string
        method:
          type: string
        metadata:
          type: object
    Transfer:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        amount:
          type: number
        currency:
          type: string
        created_at:
          type: string
        escrow_id:
          type: string
